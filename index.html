<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник служб</title>
    <style>
        /* Минималистичный дизайн и центрирование */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        select:focus {
            border-color: #0070f3;
        }

        .result-box {
            margin-top: 25px;
            display: none; /* Скрыто по умолчанию */
        }

        .info-group {
            margin-bottom: 15px;
        }

        .label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        /* white-space: pre-line активирует переносы строк из \n */
        .value {
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-line; 
        }

        a {
            color: #0070f3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Что случилось?</h2>
        <select id="issueSelect" onchange="showDetails()">
            <option value="" disabled selected>Выберите проблему...</option>
        </select>

        <div id="result" class="result-box">
            <div class="info-group">
                <div class="label">Служба</div>
                <div id="serviceValue" class="value"></div>
            </div>
            <div class="info-group">
                <div class="label">Контакты</div>
                <div id="contactValue" class="value"></div>
            </div>
            <div class="info-group">
                <div class="label">Ссылка</div>
                <div id="urlValue" class="value"></div>
            </div>
        </div>
    </div>

    <!-- Подключаем данные -->
    <script src="data.js"></script>
    <script>
        const select = document.getElementById('issueSelect');
        const resultBox = document.getElementById('result');

        // Динамически заполняем выпадающий список
        issuesData.forEach((item, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = item.issue;
            select.appendChild(option);
        });

        // Функция отображения данных при выборе
        function showDetails() {
            const selectedIndex = select.value;
            const data = issuesData[selectedIndex];

            if (data) {
                document.getElementById('serviceValue').textContent = data.service;
                document.getElementById('contactValue').textContent = data.contact;
                
                // Делаем ссылку кликабельной
                const urlContainer = document.getElementById('urlValue');
                urlContainer.innerHTML = `<a href="${data.url}" target="_blank">${data.url}</a>`;

                resultBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
